<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💝 Sesuatu yang Spesial Untukmu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Poppins:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0c0015 0%, #1a0a2e 30%, #2d1b4e 60%, #1a0a2e 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Floating Hearts Background */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            bottom: -50px;
            font-size: 20px;
            animation: floatUp linear infinite;
            opacity: 0.3;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.2;
            }
            100% {
                transform: translateY(-110vh) rotate(720deg) scale(0.5);
                opacity: 0;
            }
        }

        /* Stars */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
            max-width: 420px;
            width: 100%;
        }

        /* Step Screens */
        .step {
            display: none;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .step.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOutDown {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-40px);
            }
        }

        .step.leaving {
            animation: fadeOutDown 0.5s ease-in forwards;
        }

        /* Envelope */
        .envelope-wrapper {
            position: relative;
            width: 200px;
            height: 150px;
            margin: 0 auto 30px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .envelope-wrapper:hover {
            transform: scale(1.05);
        }

        .envelope {
            width: 200px;
            height: 140px;
            background: linear-gradient(135deg, #e8b4cb, #f5d0e0);
            border-radius: 10px;
            position: relative;
            box-shadow: 0 15px 40px rgba(232, 180, 203, 0.3);
            overflow: hidden;
        }

        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-top: 80px solid #d4a0b9;
            z-index: 2;
        }

        .envelope-heart {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            z-index: 3;
            animation: heartPulse 1.5s ease-in-out infinite;
        }

        @keyframes heartPulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.2); }
        }

        /* Typography */
        .greeting-text {
            font-family: 'Great Vibes', cursive;
            font-size: 28px;
            color: #f5b8d4;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(245, 184, 212, 0.5);
        }

        .sub-text {
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            line-height: 1.8;
            padding: 0 10px;
        }

        .name-highlight {
            font-family: 'Great Vibes', cursive;
            font-size: 42px;
            background: linear-gradient(135deg, #f5b8d4, #ffd4e8, #f5b8d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 10px 0;
            text-shadow: none;
            filter: drop-shadow(0 0 15px rgba(245, 184, 212, 0.4));
        }

        .age-text {
            font-family: 'Playfair Display', serif;
            font-size: 80px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #ffaa00, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 10px 0;
            line-height: 1;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.3));
        }

        .age-label {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 40px;
            border: none;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e8618c, #d4447a);
            color: #fff;
            box-shadow: 0 8px 30px rgba(232, 97, 140, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(232, 97, 140, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-glow {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a0a2e;
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.4);
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 8px 30px rgba(255, 215, 0, 0.4); }
            50% { box-shadow: 0 8px 50px rgba(255, 215, 0, 0.7); }
        }

        .btn-glow:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 12px 50px rgba(255, 215, 0, 0.7);
        }

        .btn span.emoji {
            font-size: 20px;
        }

        /* Gift box */
        .gift-box {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            position: relative;
            animation: gentleBounce 2s ease-in-out infinite;
        }

        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .gift-body {
            width: 100px;
            height: 80px;
            background: linear-gradient(135deg, #e8618c, #d4447a);
            border-radius: 10px;
            position: absolute;
            bottom: 0;
            left: 10px;
            box-shadow: 0 10px 30px rgba(232, 97, 140, 0.4);
        }

        .gift-body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 100%;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
        }

        .gift-lid {
            width: 110px;
            height: 25px;
            background: linear-gradient(135deg, #d4447a, #c0305e);
            border-radius: 8px;
            position: absolute;
            bottom: 75px;
            left: 5px;
            box-shadow: 0 5px 15px rgba(232, 97, 140, 0.3);
        }

        .gift-lid::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 100%;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
        }

        .gift-ribbon-left, .gift-ribbon-right {
            position: absolute;
            bottom: 95px;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            border: 5px solid #ffd700;
            background: transparent;
        }

        .gift-ribbon-left {
            left: 25px;
            border-right: none;
        }

        .gift-ribbon-right {
            right: 25px;
            border-left: none;
        }

        /* Sparkle effect */
        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ffd700;
            border-radius: 50%;
            animation: sparkle 1.5s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* Question mark animation */
        .question-marks {
            font-size: 60px;
            margin-bottom: 20px;
            animation: questionPop 2s ease-in-out infinite;
        }

        @keyframes questionPop {
            0%, 100% { transform: rotate(-5deg) scale(1); }
            25% { transform: rotate(5deg) scale(1.1); }
            50% { transform: rotate(-3deg) scale(1.05); }
            75% { transform: rotate(3deg) scale(1.08); }
        }

        /* Confetti */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .confetti-piece {
            position: absolute;
            top: -20px;
            width: 10px;
            height: 10px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Typewriter */
        .typewriter {
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid rgba(245, 184, 212, 0.8);
            animation: typing 3s steps(30) 0.5s forwards, blinkCursor 0.8s step-end infinite;
            width: 0;
            max-width: fit-content;
            margin: 0 auto;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blinkCursor {
            from, to { border-color: transparent; }
            50% { border-color: rgba(245, 184, 212, 0.8); }
        }

        /* Responsive */
        @media (min-width: 768px) {
            .container {
                max-width: 500px;
            }
            .greeting-text {
                font-size: 36px;
            }
            .name-highlight {
                font-size: 52px;
            }
            .age-text {
                font-size: 100px;
            }
            .sub-text {
                font-size: 16px;
            }
        }

        @media (min-width: 1024px) {
            .container {
                max-width: 600px;
            }
            .greeting-text {
                font-size: 42px;
            }
            .name-highlight {
                font-size: 60px;
            }
        }

        /* Loading screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0c0015;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-heart {
            font-size: 40px;
            animation: heartPulse 1s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-heart">💝</div>
    </div>

    <!-- Background Effects -->
    <div class="stars-container" id="starsContainer"></div>
    <div class="hearts-container" id="heartsContainer"></div>

    <!-- Main Content -->
    <div class="container">

        <!-- STEP 1: Opening -->
        <div class="step active" id="step1">
            <div class="envelope-wrapper" onclick="goToStep(2)">
                <div class="envelope">
                    <div class="envelope-heart">💌</div>
                </div>
            </div>
            <p class="greeting-text typewriter">Hai, ada sesuatu untukmu...</p>
            <p class="sub-text">Seseorang ingin menyampaikan<br>sesuatu yang sangat spesial ✨</p>
            <button class="btn btn-primary" onclick="goToStep(2)">
                <span class="emoji">💌</span> Buka Pesannya
            </button>
        </div>

        <!-- STEP 2: Teaser -->
        <div class="step" id="step2">
            <div class="question-marks">🎁</div>
            <p class="greeting-text">Tebak ada apa hari ini?</p>
            <p class="sub-text">Hari ini adalah hari yang sangat spesial...<br>Hari di mana dunia mendapatkan hadiah terindah 🌸</p>
            <button class="btn btn-primary" onclick="goToStep(3)">
                <span class="emoji">🤔</span> Hmm, Apa ya?
            </button>
        </div>

        <!-- STEP 3: Reveal Name -->
        <div class="step" id="step3">
            <div class="gift-box">
                <div class="gift-ribbon-left"></div>
                <div class="gift-ribbon-right"></div>
                <div class="gift-lid"></div>
                <div class="gift-body"></div>
                <div class="sparkle" style="top: -10px; left: 20px; animation-delay: 0s;"></div>
                <div class="sparkle" style="top: 0; right: 15px; animation-delay: 0.5s;"></div>
                <div class="sparkle" style="top: -15px; left: 60px; animation-delay: 1s;"></div>
            </div>
            <p class="greeting-text">Ini untukmu...</p>
            <div class="name-highlight">Veronica Khansa</div>
            <p class="sub-text">Yang hari ini genap berusia</p>
            <div class="age-text">26</div>
            <p class="age-label">T A H U N</p>
            <button class="btn btn-glow" onclick="goToBirthday()">
                <span class="emoji">🎉</span> Buka Ucapannya!
            </button>
        </div>
    </div>

    <!-- Confetti Container -->
    <div class="confetti-container" id="confettiContainer"></div>

    <script>
        // Loading Screen
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 1200);
        });

        // Create stars
        function createStars() {
            const container = document.getElementById('starsContainer');
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.width = (Math.random() * 3 + 1) + 'px';
                star.style.height = star.style.width;
                container.appendChild(star);
            }
        }

        // Create floating hearts
        function createHearts() {
            const container = document.getElementById('heartsContainer');
            const heartEmojis = ['💕', '💖', '💗', '💝', '✨', '🌸', '💫'];
            
            setInterval(function() {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (Math.random() * 15 + 12) + 'px';
                heart.style.animationDuration = (Math.random() * 8 + 8) + 's';
                container.appendChild(heart);

                setTimeout(function() {
                    heart.remove();
                }, 16000);
            }, 800);
        }

        // Step navigation
        let currentStep = 1;

        function goToStep(stepNum) {
            const currentEl = document.getElementById('step' + currentStep);
            const nextEl = document.getElementById('step' + stepNum);

            currentEl.classList.add('leaving');

            setTimeout(function() {
                currentEl.classList.remove('active', 'leaving');
                nextEl.classList.add('active');
                currentStep = stepNum;

                // Trigger confetti on step 3
                if (stepNum === 3) {
                    createConfetti();
                }
            }, 500);
        }

        function goToBirthday() {
            createConfetti();
            setTimeout(function() {
                window.location.href = 'birthday.html';
            }, 1000);
        }

        // Confetti
        function createConfetti() {
            const container = document.getElementById('confettiContainer');
            const colors = ['#e8618c', '#ffd700', '#f5b8d4', '#ff6b9d', '#c084fc', '#60a5fa', '#34d399', '#fbbf24'];

            for (let i = 0; i < 80; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti-piece';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = (Math.random() * 10 + 5) + 'px';
                confetti.style.height = (Math.random() * 10 + 5) + 'px';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                confetti.style.animationDelay = Math.random() * 1 + 's';
                container.appendChild(confetti);

                setTimeout(function() {
                    confetti.remove();
                }, 5000);
            }
        }

        // Init
        createStars();
        createHearts();
    </script>
</body>
</html>
